name: Errands
options:
  bundleIdPrefix: com.alican
  deploymentTarget:
    iOS: "17.0"
targets:
  Errands:
    type: application
    platform: iOS
    sources: [App/Sources]
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Errands
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: Errands uses your location to plant a test geofence at your current position.
        NSLocationAlwaysAndWhenInUseUsageDescription: Errands needs Always access so store reminders can fire in the background, even when the app is closed.
        UIBackgroundModes: [location]
        NSMotionUsageDescription: Errands uses motion activity (walking vs. driving) to time reminders sensibly.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alican.errands
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGN_IDENTITY: ""
